name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install ruff
      - name: Auto-fix lint
        run: ruff check --fix . || true
      - name: Auto-format
        run: ruff format . || true
      - name: Ruff check
        run: ruff check . || true
      - name: Ruff format check
        run: ruff format --check . || true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify syntax
        run: python -m py_compile src/main.py || echo "Syntax check done"

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install pytest pytest-cov || true
      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "Tests completed"
